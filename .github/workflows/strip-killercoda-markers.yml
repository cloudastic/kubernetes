name: Strip KillerCoda Markers

on:
  push:
    branches:
      - main
    paths:
      - '**/*.md'

jobs:
  strip-markers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Strip KillerCoda markers from markdown files
        run: |
          find . -name "*.md" -not -path "./.git/*" | while read file; do
            sed -i -E 's/(```)\{\{[a-z]+\}\}/\1/g' "$file"
          done

      - name: Commit cleaned files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: strip KillerCoda markers for GitHub compatibility"
          git push
          
